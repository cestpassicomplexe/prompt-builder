<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt Builder v3</title>

    <!-- Marked.js for Markdown to HTML conversion -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- DOMPurify for sanitizing HTML from Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/dompurify@2.3.6/dist/purify.min.js"></script>
    <!-- Emoji Picker Element -->
    <script type="module" src="https://cdn.jsdelivr.net/npm/emoji-picker-element@^1/index.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        :root {
            --primary-color: #007bff;
            --secondary-color: #6c757d;
            --light-gray: #f8f9fa;
            --medium-gray: #e9ecef;
            --dark-gray: #495057;
            --border-color: #dee2e6;
            --success-color: #28a745;
            --danger-color: #dc3545;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-family);
            margin: 0;
            background-color: var(--light-gray);
            display: flex;
            flex-direction: column;
            height: 100vh;
            color: var(--dark-gray);
        }

        /* Header */
        header {
            background-color: #fff;
            padding: 15px 25px;
            border-bottom: 1px solid var(--border-color);
            box-shadow: var(--shadow);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        header h1 {
            font-size: 1.5em;
            margin: 0;
        }

        #main-controls button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            transition: background-color 0.2s;
            margin-left: 10px;
        }

        #main-controls button:hover {
            background-color: #0056b3;
        }

        #main-controls button.secondary {
            background-color: var(--secondary-color);
        }

        #main-controls button.secondary:hover {
            background-color: #5a6268;
        }

        #main-controls button.icon-btn {
            padding: 8px 10px;
            font-size: 1.1em;
            line-height: 1;
        }

        /* Main Container */
        .app-container {
            display: flex;
            flex-grow: 1;
            overflow: hidden;
        }

        /* Editor Section */
        #editor-section {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            background-color: #fff;
            border-right: 1px solid var(--border-color);
            overflow: hidden;
        }

        /* Toolbar */
        #editor-toolbar {
            padding: 10px 15px;
            background-color: var(--light-gray);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            align-items: center;
        }

        #editor-toolbar button {
            padding: 6px 10px;
            border: 1px solid var(--border-color);
            background: #fff;
            cursor: pointer;
            border-radius: 4px;
            font-size: 0.9em;
            transition: background-color 0.2s;
        }

        #editor-toolbar button:hover {
            background: var(--medium-gray);
        }

        #editor-toolbar .separator {
            width: 1px;
            height: 24px;
            background-color: var(--border-color);
            margin: 0 5px;
        }

        #insert-field-dropdown {
            padding: 6px 10px;
            border: 1px solid var(--border-color);
            background: #fff;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9em;
        }

        /* Editor */
        #editor-container {
            flex-grow: 1;
            overflow-y: auto;
            padding: 20px;
            position: relative;
        }

        #prompt-editor {
            width: 100%;
            min-height: 100%;
            border: none;
            outline: none;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.6;
            resize: none;
            padding: 0;
        }

        /* Properties Panel */
        #properties-panel {
            width: 350px;
            min-width: 350px;
            flex-shrink: 0;
            padding: 20px;
            background-color: #fff;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        #properties-panel h3 {
            margin-top: 0;
            font-size: 1.1em;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }

        .property-group {
            margin-bottom: 15px;
        }

        .property-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 0.9em;
        }

        .property-group input[type="text"],
        .property-group input[type="number"],
        .property-group select,
        .property-group textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 0.9em;
        }

        .property-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .property-group .id-display {
            background-color: var(--medium-gray);
            padding: 8px;
            border-radius: 4px;
            font-family: monospace;
            word-break: break-all;
            border: 1px solid var(--border-color);
            font-size: 0.85em;
        }

        .property-group .type-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.85em;
            font-weight: 500;
        }

        .property-group .checkbox-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
            background-color: var(--light-gray);
            padding: 10px;
            border-radius: 4px;
        }

        .property-group button.delete-field {
            width: 100%;
            padding: 10px;
            background-color: var(--danger-color);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
            transition: background-color 0.2s;
        }

        .property-group button.delete-field:hover {
            background-color: #c82333;
        }

        /* Preview Section */
        #preview-section {
            background-color: #fff;
            border-top: 2px solid var(--border-color);
            max-height: 40vh;
            overflow-y: auto;
            transition: max-height 0.3s ease;
        }

        #preview-section.collapsed {
            max-height: 45px;
        }

        #preview-header {
            padding: 12px 20px;
            background-color: var(--light-gray);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            user-select: none;
        }

        #preview-header h3 {
            margin: 0;
            font-size: 1em;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #preview-header .toggle-icon {
            transition: transform 0.3s;
        }

        #preview-section.collapsed #preview-header .toggle-icon {
            transform: rotate(-90deg);
        }

        #preview-content {
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }

        #preview-section.collapsed #preview-content {
            display: none;
        }

        /* Preview form styling */
        #preview-content fieldset {
            border: 1px solid var(--border-color);
            padding: 1em;
            border-radius: 5px;
            margin-bottom: 15px;
        }

        #preview-content legend {
            font-weight: bold;
            padding: 0 8px;
        }

        #preview-content select,
        #preview-content input[type="text"],
        #preview-content input[type="number"],
        #preview-content input[type="url"],
        #preview-content textarea {
            width: 100%;
            box-sizing: border-box;
            padding: 8px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            margin-top: 5px;
            margin-bottom: 5px;
        }

        #preview-content input[type="range"] {
            width: 100%;
        }

        #preview-content input[type="range"]+output {
            margin-left: 10px;
            font-weight: 500;
        }

        /* Emoji picker */
        #emoji-picker-container {
            position: absolute;
            z-index: 100;
            display: none;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow);
        }

        /* Field Recall Badge */
        .field-recall {
            font-size: 0.85em;
            background: #e0e0e0;
            color: #666;
            padding: 2px 6px;
            border-radius: 4px;
            border: 1px dashed #bbb;
            display: inline-block;
            margin: 2px 0;
            transition: all 0.2s ease;
        }

        .field-recall.filled {
            background: #e2f0d9 !important;
            color: #385723 !important;
            border-color: #c5e0b4 !important;
            border-style: solid !important;
            font-weight: bold;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--secondary-color);
        }

        .empty-state i {
            font-size: 3em;
            margin-bottom: 15px;
            opacity: 0.5;
        }
    </style>
</head>

<body>

    <header>
        <h1>Prompt Builder v3</h1>
        <div id="main-controls">
            <button id="save-config-btn" class="secondary icon-btn" title="Sauvegarder la Configuration">
                <i class="fas fa-save"></i>
            </button>
            <button id="load-config-btn" class="secondary icon-btn" title="Charger la Configuration">
                <i class="fas fa-upload"></i>
            </button>
            <input type="file" id="load-config-input" accept=".json,.builderconfig,.technopedia" style="display: none;">
            <button id="copy-text-btn" class="secondary">Copier le texte du Prompt</button>
            <button id="generate-html-btn">Copier code HTML + aperçu</button>
        </div>
    </header>

    <div class="app-container">
        <!-- Editor Section -->
        <section id="editor-section">
            <!-- Toolbar -->
            <div id="editor-toolbar">
                <button data-format="bold" title="Gras (Ctrl+B)"><b>B</b></button>
                <button data-format="italic" title="Italique (Ctrl+I)"><i>I</i></button>
                <button data-format="underline" title="Souligné"><u>U</u></button>
                <div class="separator"></div>
                <button data-format="bullet-list" title="Liste à puces">●</button>
                <button data-format="numbered-list" title="Liste numérotée">1.</button>
                <button data-format="url" title="Lien">🔗</button>
                <button data-format="emoji" title="Emoji">😀</button>
                <div id="emoji-picker-container">
                    <emoji-picker></emoji-picker>
                </div>
                <div class="separator"></div>
                <select id="insert-field-dropdown">
                    <option value="">Insérer un champ...</option>
                    <option value="text-input">📝 Zone de texte</option>
                    <option value="number-input">🔢 Champ numérique</option>
                    <option value="url-input">🔗 Champ d'URL</option>
                    <option value="textarea">📄 Zone de texte multi-lignes</option>
                    <option value="dropdown">▼ Liste déroulante</option>
                    <option value="qcm">⚪ QCM (Choix unique)</option>
                    <option value="checkbox">☑️ Cases à cocher</option>
                    <option value="range-input">🎚️ Curseur (Range)</option>
                </select>
            </div>

            <!-- Editor -->
            <div id="editor-container">
                <textarea id="prompt-editor" placeholder="Écrivez votre prompt ici...

Vous pouvez utiliser le Markdown pour formater votre texte :
- **gras**, *italique*
- Listes à puces
- Liens, etc.

Utilisez le menu 'Insérer un champ' pour ajouter des champs interactifs."></textarea>
            </div>
        </section>

        <!-- Properties Panel -->
        <aside id="properties-panel">
            <h3>Propriétés</h3>
            <div id="properties-content">
                <div class="empty-state">
                    <i class="fas fa-hand-pointer"></i>
                    <p>Cliquez sur un champ dans l'éditeur pour voir ses propriétés</p>
                </div>
            </div>
        </aside>
    </div>

    <!-- Preview Section -->
    <section id="preview-section">
        <div id="preview-header">
            <h3>
                <span class="toggle-icon">▼</span>
                Aperçu en temps réel
            </h3>
            <span style="font-size: 0.85em; color: var(--secondary-color);">Cliquez pour replier/déplier</span>
        </div>
        <div id="preview-content">
            <div class="empty-state">
                <i class="fas fa-eye"></i>
                <p>L'aperçu de votre prompt apparaîtra ici</p>
            </div>
        </div>
    </section>

    <script src="script.js"></script>

</body>


</html>
